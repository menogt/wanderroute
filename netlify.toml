# Netlify build + API proxy configuration.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Map client-facing API paths to Netlify Functions. Status 200 means rewrite,
# so the URL visible to the browser does not change.
[[redirects]]
  from = "/api/foursquare"
  to = "/.netlify/functions/foursquare"
  status = 200

[[redirects]]
  from = "/api/generate-itinerary"
  to = "/.netlify/functions/generate-itinerary"
  status = 200

# SPA fallback - let the client router handle all other routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
